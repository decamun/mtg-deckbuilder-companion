name: CI

on: [push, pull_request]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: P0 security static checks
        run: npm run test:p0-security

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ejnnjdvgrwsjfgafxtvk.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_ci_placeholder
        run: npm run build

      - name: npm audit (informational)
        run: npm audit --omit=dev
        continue-on-error: true
