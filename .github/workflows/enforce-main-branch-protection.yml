name: Enforce main branch protection

# Maintainer setup (one-time, required):
# 1) Create a classic PAT for the maintainer account that is allowed to update
#    repository branch protection:
#      - scope: public_repo (recommended for this public repository)
#      - scope: repo (only if the repository is private)
#      - scope: admin:repo_hook (recommended for repo admin operations)
# 2) Save it in this repository as secret: ADMIN_GITHUB_TOKEN
#    Settings -> Secrets and variables -> Actions -> New repository secret
# 3) (Optional) Set repository variable MAIN_BRANCH_MAINTAINER if the maintainer
#    username is not the repository default ("decamun").
#    Settings -> Secrets and variables -> Actions -> Variables
# 4) Run this workflow once with workflow_dispatch after saving credentials.
#
# Security notes:
# - Keep ADMIN_GITHUB_TOKEN limited to the maintainer account only.
# - Rotate/revoke the token immediately if exposed.

on:
  workflow_dispatch:
    inputs:
      maintainer:
        description: GitHub username allowed to push directly to main
        required: false
        default: decamun
  schedule:
    - cron: '17 4 * * *'

permissions: {}

jobs:
  protect-main:
    runs-on: ubuntu-latest
    env:
      MAINTAINER_USERNAME: ${{ github.event.inputs.maintainer || vars.MAIN_BRANCH_MAINTAINER || 'decamun' }}
    steps:
      - name: Ensure admin token is configured
        env:
          ADMIN_GITHUB_TOKEN: ${{ secrets.ADMIN_GITHUB_TOKEN }}
        run: |
          if [ -z "$ADMIN_GITHUB_TOKEN" ]; then
            echo "Error: ADMIN_GITHUB_TOKEN secret is required to manage branch protection."
            exit 1
          fi

      - name: Apply protection rules to main
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.ADMIN_GITHUB_TOKEN }}
          script: |
            const maintainer = process.env.MAINTAINER_USERNAME;

            await github.request("PUT /repos/{owner}/{repo}/branches/{branch}/protection", {
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: "main",
              required_status_checks: null,
              enforce_admins: true,
              required_pull_request_reviews: null,
              restrictions: {
                users: [maintainer],
                teams: [],
                apps: [],
              },
              required_linear_history: true,
              allow_force_pushes: false,
              allow_deletions: false,
              block_creations: false,
              required_conversation_resolution: false,
              lock_branch: false,
              allow_fork_syncing: false,
            });

            core.info(`Applied branch protection on main with push access restricted to ${maintainer}.`);
