name: Check migration filenames

on:
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'merge_group' && github.event.merge_group.head_sha || github.event.pull_request.head.sha }}

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event_name == 'merge_group' && github.event.merge_group.base_sha || github.event.pull_request.base.sha }}
          ref: ${{ github.event_name == 'merge_group' && github.event.merge_group.head_sha || github.event.pull_request.head.sha }}
          filters: |
            migrations:
              - 'supabase/migrations/**'
              - 'scripts/check-migration-filenames.mjs'
              - '.github/workflows/check-migration-filenames.yml'

      - uses: actions/setup-node@v6
        if: steps.filter.outputs.migrations == 'true'
        with:
          node-version: '24'

      - name: Validate added migration filenames
        if: steps.filter.outputs.migrations == 'true'
        run: node scripts/check-migration-filenames.mjs

      - name: Skip (no migration-related files changed)
        if: steps.filter.outputs.migrations != 'true'
        run: echo "No migration-related files in this diff; skipping filename validation."
